<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Arial', sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 800px;
            max-width: 90vw;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .score {
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            min-width: 100px;
        }

        .player-label {
            font-size: 18px;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .divider {
            width: 2px;
            height: 60px;
            background: rgba(255, 255, 255, 0.3);
        }

        #gameCanvas {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            background: #0a0a0a;
            cursor: none;
            touch-action: none;
        }

        .controls {
            display: flex;
            justify-content: space-around;
            width: 800px;
            max-width: 90vw;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            font-size: 14px;
        }

        .control-set {
            text-align: center;
        }

        .control-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .control-title.p1 {
            color: #4ecdc4;
        }

        .control-title.p2 {
            color: #ff6b6b;
        }

        .control-keys {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 5px;
            flex-wrap: wrap;
        }

        .key {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 12px;
            border-radius: 5px;
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .game-title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(78, 205, 196, 0.5);
        }

        .touch-indicator {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            transform: translate(-50%, -50%);
        }

        .touch-indicator.p1 {
            border-color: #4ecdc4;
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.5);
        }

        .touch-indicator.p2 {
            border-color: #ff6b6b;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }

        .touch-indicator.active {
            opacity: 0.8;
        }

        @media (max-width: 850px) {
            .score-board, .controls {
                width: 95vw;
            }

            .game-title {
                font-size: 36px;
            }

            .score {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1 class="game-title">3D PONG</h1>

        <div class="score-board">
            <div>
                <div class="player-label">Player 1</div>
                <div class="score" id="player1Score">0</div>
            </div>
            <div class="divider"></div>
            <div>
                <div class="player-label">Player 2</div>
                <div class="score" id="player2Score">0</div>
            </div>
        </div>

        <div style="position: relative;">
            <canvas id="gameCanvas"></canvas>
            <div class="touch-indicator p1" id="touchIndicator1"></div>
            <div class="touch-indicator p2" id="touchIndicator2"></div>
        </div>

        <div class="controls">
            <div class="control-set">
                <div class="control-title p1">Player 1</div>
                <div class="control-keys">
                    <span class="key">W</span>
                    <span class="key">S</span>
                </div>
                <div style="margin-top: 5px; opacity: 0.7;">Keyboard: Up / Down</div>
                <div style="margin-top: 5px; opacity: 0.7;">Mouse/Touch: Left Half</div>
            </div>
            <div class="control-set">
                <div class="control-title p2">Player 2</div>
                <div class="control-keys">
                    <span class="key">↑</span>
                    <span class="key">↓</span>
                </div>
                <div style="margin-top: 5px; opacity: 0.7;">Keyboard: Up / Down</div>
                <div style="margin-top: 5px; opacity: 0.7;">Mouse/Touch: Right Half</div>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // Canvas setup
        const canvas = document.getElementById('gameCanvas');
        const player1ScoreElement = document.getElementById('player1Score');
        const player2ScoreElement = document.getElementById('player2Score');
        const touchIndicator1 = document.getElementById('touchIndicator1');
        const touchIndicator2 = document.getElementById('touchIndicator2');

        // Set canvas size
        const canvasWidth = Math.min(800, window.innerWidth - 40);
        const canvasHeight = Math.min(600, window.innerHeight - 400);
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;

        // Three.js setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);

        const camera = new THREE.PerspectiveCamera(
            75,
            canvasWidth / canvasHeight,
            0.1,
            1000
        );
        camera.position.set(0, 0, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setSize(canvasWidth, canvasHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 5, 10);
        directionalLight.castShadow = true;
        directionalLight.shadow.camera.left = -15;
        directionalLight.shadow.camera.right = 15;
        directionalLight.shadow.camera.top = 15;
        directionalLight.shadow.camera.bottom = -15;
        scene.add(directionalLight);

        const backLight = new THREE.DirectionalLight(0x4ecdc4, 0.3);
        backLight.position.set(0, 0, -10);
        scene.add(backLight);

        // Game dimensions (3D coordinate system)
        const gameWidth = 16;
        const gameHeight = 12;

        // Back wall for depth perception
        const wallGeometry = new THREE.PlaneGeometry(gameWidth, gameHeight);
        const wallMaterial = new THREE.MeshStandardMaterial({
            color: 0x1a1a2e,
            roughness: 0.8,
            metalness: 0.2
        });
        const backWall = new THREE.Mesh(wallGeometry, wallMaterial);
        backWall.position.z = -2;
        backWall.receiveShadow = true;
        scene.add(backWall);

        // Center net
        const netSegments = [];
        const netSegmentHeight = 0.5;
        const netGap = 0.4;
        const netCount = Math.floor(gameHeight / (netSegmentHeight + netGap));

        for (let i = 0; i < netCount; i++) {
            const netGeometry = new THREE.BoxGeometry(0.1, netSegmentHeight, 0.2);
            const netMaterial = new THREE.MeshStandardMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.3,
                emissive: 0xffffff,
                emissiveIntensity: 0.1
            });
            const netSegment = new THREE.Mesh(netGeometry, netMaterial);
            netSegment.position.set(
                0,
                -gameHeight / 2 + (i * (netSegmentHeight + netGap)) + netSegmentHeight / 2,
                0
            );
            scene.add(netSegment);
            netSegments.push(netSegment);
        }

        // Ball
        const ballRadius = 0.3;
        const ballGeometry = new THREE.SphereGeometry(ballRadius, 32, 32);
        const ballMaterial = new THREE.MeshPhongMaterial({
            color: 0xffffff,
            emissive: 0xffffff,
            emissiveIntensity: 0.5,
            shininess: 100
        });
        const ballMesh = new THREE.Mesh(ballGeometry, ballMaterial);
        ballMesh.castShadow = true;
        scene.add(ballMesh);

        // Ball light for glow effect
        const ballLight = new THREE.PointLight(0xffffff, 1, 5);
        ballMesh.add(ballLight);

        // Paddles
        const paddleWidth = 0.4;
        const paddleHeight = 2.5;
        const paddleDepth = 0.4;

        const paddle1Geometry = new THREE.BoxGeometry(paddleWidth, paddleHeight, paddleDepth);
        const paddle1Material = new THREE.MeshStandardMaterial({
            color: 0x4ecdc4,
            emissive: 0x4ecdc4,
            emissiveIntensity: 0.3,
            metalness: 0.5,
            roughness: 0.3
        });
        const paddle1Mesh = new THREE.Mesh(paddle1Geometry, paddle1Material);
        paddle1Mesh.castShadow = true;
        scene.add(paddle1Mesh);

        const paddle2Geometry = new THREE.BoxGeometry(paddleWidth, paddleHeight, paddleDepth);
        const paddle2Material = new THREE.MeshStandardMaterial({
            color: 0xff6b6b,
            emissive: 0xff6b6b,
            emissiveIntensity: 0.3,
            metalness: 0.5,
            roughness: 0.3
        });
        const paddle2Mesh = new THREE.Mesh(paddle2Geometry, paddle2Material);
        paddle2Mesh.castShadow = true;
        scene.add(paddle2Mesh);

        // Particle trail for ball
        const trailParticles = [];
        const trailLength = 10;

        for (let i = 0; i < trailLength; i++) {
            const particleGeometry = new THREE.SphereGeometry(ballRadius * 0.5, 16, 16);
            const particleMaterial = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0
            });
            const particle = new THREE.Mesh(particleGeometry, particleMaterial);
            scene.add(particle);
            trailParticles.push({
                mesh: particle,
                position: new THREE.Vector3(0, 0, 0)
            });
        }

        // Game state
        const ball = {
            x: 0,
            y: 0,
            speedX: 0.12,
            speedY: 0.12,
            initialSpeed: 0.12
        };

        const player1 = {
            x: -gameWidth / 2 + 0.5,
            y: 0,
            upPressed: false,
            downPressed: false,
            speed: 0.15,
            score: 0,
            targetY: 0
        };

        const player2 = {
            x: gameWidth / 2 - 0.5,
            y: 0,
            upPressed: false,
            downPressed: false,
            speed: 0.15,
            score: 0,
            targetY: 0
        };

        // Mouse/Touch controls
        let mouseY = null;
        let touchActive = { p1: false, p2: false };

        function handlePointerMove(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const x = clientX - rect.left;
            const y = clientY - rect.top;

            // Convert to game coordinates
            const normalizedY = (y / canvasHeight) * gameHeight - gameHeight / 2;
            const flippedY = -normalizedY; // Flip Y axis to match 3D coordinates

            // Determine which half of the screen
            if (x < canvasWidth / 2) {
                // Left half - Player 1
                player1.targetY = flippedY;
                if (!touchActive.p1) {
                    touchIndicator1.style.left = `${x}px`;
                    touchIndicator1.style.top = `${y}px`;
                    touchIndicator1.classList.add('active');
                    touchActive.p1 = true;
                }
            } else {
                // Right half - Player 2
                player2.targetY = flippedY;
                if (!touchActive.p2) {
                    touchIndicator2.style.left = `${x}px`;
                    touchIndicator2.style.top = `${y}px`;
                    touchIndicator2.classList.add('active');
                    touchActive.p2 = true;
                }
            }
        }

        // Mouse events
        canvas.addEventListener('mousemove', (e) => {
            handlePointerMove(e.clientX, e.clientY);
        });

        canvas.addEventListener('mouseleave', () => {
            touchIndicator1.classList.remove('active');
            touchIndicator2.classList.remove('active');
            touchActive.p1 = false;
            touchActive.p2 = false;
        });

        // Touch events
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                handlePointerMove(touch.clientX, touch.clientY);
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                handlePointerMove(touch.clientX, touch.clientY);
            }
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            touchIndicator1.classList.remove('active');
            touchIndicator2.classList.remove('active');
            touchActive.p1 = false;
            touchActive.p2 = false;
        });

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'w') player1.upPressed = true;
            if (e.key.toLowerCase() === 's') player1.downPressed = true;
            if (e.key === 'ArrowUp') {
                player2.upPressed = true;
                e.preventDefault();
            }
            if (e.key === 'ArrowDown') {
                player2.downPressed = true;
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key.toLowerCase() === 'w') player1.upPressed = false;
            if (e.key.toLowerCase() === 's') player1.downPressed = false;
            if (e.key === 'ArrowUp') player2.upPressed = false;
            if (e.key === 'ArrowDown') player2.downPressed = false;
        });

        // Game functions
        function resetBall() {
            ball.x = 0;
            ball.y = 0;

            const direction = Math.random() > 0.5 ? 1 : -1;
            ball.speedX = ball.initialSpeed * direction;
            ball.speedY = (Math.random() * 0.08 - 0.04) + (Math.random() > 0.5 ? 0.04 : -0.04);

            // Reset trail
            trailParticles.forEach(particle => {
                particle.mesh.material.opacity = 0;
                particle.position.set(ball.x, ball.y, 0);
            });
        }

        function updatePaddle(player, paddleMesh) {
            const maxY = gameHeight / 2 - paddleHeight / 2;
            const minY = -gameHeight / 2 + paddleHeight / 2;

            // Keyboard controls
            if (player.upPressed && player.y < maxY) {
                player.y += player.speed;
            }
            if (player.downPressed && player.y > minY) {
                player.y -= player.speed;
            }

            // Mouse/Touch controls with smooth interpolation
            if (touchActive.p1 && player === player1 || touchActive.p2 && player === player2) {
                const clampedTargetY = Math.max(minY, Math.min(maxY, player.targetY));
                const diff = clampedTargetY - player.y;
                player.y += diff * 0.15; // Smooth interpolation
            }

            // Update mesh position
            paddleMesh.position.x = player.x;
            paddleMesh.position.y = player.y;
        }

        function checkPaddleCollision(player, paddleMesh) {
            const paddleLeft = player.x - paddleWidth / 2;
            const paddleRight = player.x + paddleWidth / 2;
            const paddleTop = player.y + paddleHeight / 2;
            const paddleBottom = player.y - paddleHeight / 2;

            const ballLeft = ball.x - ballRadius;
            const ballRight = ball.x + ballRadius;
            const ballTop = ball.y + ballRadius;
            const ballBottom = ball.y - ballRadius;

            // Check if ball is within paddle bounds
            if (ballRight >= paddleLeft && ballLeft <= paddleRight &&
                ballTop >= paddleBottom && ballBottom <= paddleTop) {

                // Determine which side was hit
                if (player === player1 && ball.speedX < 0) {
                    ball.speedX = -ball.speedX;

                    // Add angle based on hit position
                    const hitPos = (ball.y - player.y) / (paddleHeight / 2);
                    ball.speedY = hitPos * 0.2;

                    // Increase speed slightly
                    ball.speedX *= 1.05;
                    ball.speedY *= 1.05;

                    return true;
                } else if (player === player2 && ball.speedX > 0) {
                    ball.speedX = -ball.speedX;

                    // Add angle based on hit position
                    const hitPos = (ball.y - player.y) / (paddleHeight / 2);
                    ball.speedY = hitPos * 0.2;

                    // Increase speed slightly
                    ball.speedX *= 1.05;
                    ball.speedY *= 1.05;

                    return true;
                }
            }

            return false;
        }

        function updateBall() {
            // Move ball
            ball.x += ball.speedX;
            ball.y += ball.speedY;

            // Update ball mesh position
            ballMesh.position.x = ball.x;
            ballMesh.position.y = ball.y;
            ballMesh.position.z = 0;

            // Add rotation for visual effect
            ballMesh.rotation.x += 0.1;
            ballMesh.rotation.y += 0.1;

            // Update trail
            for (let i = trailParticles.length - 1; i > 0; i--) {
                trailParticles[i].position.copy(trailParticles[i - 1].position);
                trailParticles[i].mesh.position.copy(trailParticles[i].position);
                trailParticles[i].mesh.material.opacity = (1 - i / trailLength) * 0.3;
            }
            trailParticles[0].position.set(ball.x, ball.y, 0);
            trailParticles[0].mesh.position.set(ball.x, ball.y, 0);
            trailParticles[0].mesh.material.opacity = 0.3;

            // Wall collision
            if (ball.y - ballRadius <= -gameHeight / 2 || ball.y + ballRadius >= gameHeight / 2) {
                ball.speedY = -ball.speedY;
            }

            // Paddle collisions
            checkPaddleCollision(player1, paddle1Mesh);
            checkPaddleCollision(player2, paddle2Mesh);

            // Scoring
            if (ball.x - ballRadius <= -gameWidth / 2) {
                player2.score++;
                player2ScoreElement.textContent = player2.score;
                resetBall();
            }

            if (ball.x + ballRadius >= gameWidth / 2) {
                player1.score++;
                player1ScoreElement.textContent = player1.score;
                resetBall();
            }
        }

        // Animate net segments
        function animateNet() {
            netSegments.forEach((segment, i) => {
                segment.material.opacity = 0.2 + Math.sin(Date.now() * 0.001 + i * 0.5) * 0.1;
            });
        }

        // Game loop
        function animate() {
            requestAnimationFrame(animate);

            updatePaddle(player1, paddle1Mesh);
            updatePaddle(player2, paddle2Mesh);
            updateBall();
            animateNet();

            renderer.render(scene, camera);
        }

        // Initialize game
        resetBall();
        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            const newWidth = Math.min(800, window.innerWidth - 40);
            const newHeight = Math.min(600, window.innerHeight - 400);

            canvas.width = newWidth;
            canvas.height = newHeight;

            camera.aspect = newWidth / newHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(newWidth, newHeight);
        });
    </script>
</body>
</html>
